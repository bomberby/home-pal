<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home Pal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;1,300&display=optional" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    /* border-radius + overflow:hidden on html is the Chromium/Electron standard
       for transparent rounded corners. It clips ALL rendered content to a
       rounded rectangle. Combined with background_color='#00000000' in the
       pywebview create_window call (which sets WebView2's own DefaultBackgroundColor
       to transparent), the corner regions are truly see-through to the desktop. */
    /* Corner radius must match the Win32 DWMWCP_ROUND radius (~8 px on Win11).
       background is the same dark colour as #desktop-root so no white leaks
       through if there is a 1-2 px anti-aliasing mismatch at the clip edge. */
    html {
      background: #07091a;
      border-radius: 8px;
      overflow: hidden;
    }

    body {
      margin: 0; padding: 0;
      background: transparent;
      height: 100%;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }

    /* ─── Root card ─────────────────────── */
    #desktop-root {
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100%;
      background: linear-gradient(170deg, #0e1028 0%, #07091a 100%);
      border-radius: 8px;
      overflow: hidden;
      /* inner border for edge definition; external box-shadow is clipped by html */
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.09),
                  inset 0 1px 0 rgba(255, 255, 255, 0.06);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      position: relative;
    }

    /* accent line along the top */
    #desktop-root::before {
      content: '';
      position: absolute;
      top: 0; left: 8px; right: 8px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(99, 102, 241, 0.6), transparent);
      pointer-events: none;
      z-index: 20;
    }

    /* ─── Header ─────────────────────────── */
    #header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 8px 0 14px;
      height: 30px;
      cursor: grab;
      position: relative;
      z-index: 15;
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
    }
    #header:active { cursor: grabbing; }

    #header-title {
      font-size: 10.5px;
      font-weight: 500;
      letter-spacing: 0.1em;
      color: rgba(255, 255, 255, 0.25);
      text-transform: uppercase;
      pointer-events: none;
    }

    .header-btns { display: flex; gap: 5px; }

    .header-btn {
      width: 20px; height: 20px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      transition: opacity 0.15s, background 0.15s;
    }

    /* TTS toggle — left of other controls */
    #btn-tts-toggle {
      width: 22px; height: 22px;
      border-radius: 6px;
      background: rgba(99, 102, 241, 0.15);
      border: 1px solid rgba(99, 102, 241, 0.25);
      color: rgba(99, 102, 241, 0.85);
      font-size: 11px;
      margin-right: 3px;
    }
    #btn-tts-toggle:hover { background: rgba(99,102,241,0.3); }
    #btn-tts-toggle.muted {
      background: rgba(255, 255, 255, 0.05);
      border-color: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.25);
    }

    #btn-minimize {
      background: rgba(255, 255, 255, 0.07);
      color: rgba(255, 255, 255, 0.35);
    }
    #btn-minimize:hover { background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.8); }

    #btn-close {
      background: rgba(255, 80, 80, 0.18);
      color: rgba(255, 110, 110, 0.7);
    }
    #btn-close:hover { background: rgba(255,80,80,0.5); color: #fff; }

    /* ─── Persona image (drag region) ───── */
    #persona-img-wrap {
      flex: 1 1 auto;
      min-height: 0;
      width: 100%;
      overflow: hidden;
      cursor: grab;
      position: relative;   /* needed for absolute bubble overlay */
    }
    #persona-img-wrap:active { cursor: grabbing; }

    /* Spinner while generating */
    #persona-spinner {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 60px 0 56px;
      color: rgba(255, 255, 255, 0.28);
      font-size: 11.5px;
      font-style: italic;
      letter-spacing: 0.06em;
    }
    .spinner-dots { display: flex; gap: 5px; }
    .spinner-dots span {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: rgba(99, 102, 241, 0.6);
      animation: dot-pulse 1.4s ease-in-out infinite both;
    }
    .spinner-dots span:nth-child(2) { animation-delay: 0.2s; }
    .spinner-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dot-pulse {
      0%, 80%, 100% { transform: scale(0.5); opacity: 0.25; }
      40%           { transform: scale(1.1); opacity: 1;    }
    }

    /* Image fills container width naturally; caps at 60vh when window is short.
       object-fit: cover + top-centre keeps the head/upper body visible when cropped. */
    #persona-img {
      width: 100%;
      height: auto;
      max-height: 100%;
      object-fit: cover;
      object-position: top center;
      display: block;
      pointer-events: none;
      -webkit-mask-image: linear-gradient(to bottom, black 42%, transparent 92%);
      mask-image:         linear-gradient(to bottom, black 42%, transparent 92%);
      transition: opacity 0.5s ease;
    }

    /* ─── Speech bubble — absolute, top of image ─ */
    /* Positioned over the TOP of the character image.
       Arrow points DOWN toward the character below. */
    #persona-bubble-wrap {
      position: absolute;
      top: 10px;
      left: 14px;
      right: 14px;
      z-index: 5;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 6px;
      pointer-events: none;  /* let drag-region work through empty areas */
    }
    /* re-enable pointer events only on interactive children */
    #persona-bubble-wrap > * { pointer-events: auto; }

    .persona-bubble {
      background: rgba(255, 255, 255, 0.94);
      border-radius: 14px;
      padding: 8px 14px;
      font-size: 12.5px;
      font-style: italic;
      font-weight: 300;
      color: #1a1f50;
      filter: drop-shadow(0 4px 18px rgba(0, 0, 0, 0.55));
      max-width: 88%;
      text-align: center;
      word-break: break-word;
      position: relative;
      transition: opacity 0.35s ease;
      line-height: 1.5;
    }

    /* Arrow at the bottom of the bubble, pointing DOWN toward the character */
    .persona-bubble::after {
      content: '';
      position: absolute;
      bottom: -6px;
      left: 50%;
      transform: translateX(-50%);
      border: 6px solid transparent;
      border-top-color: rgba(255, 255, 255, 0.94);
      border-bottom: 0;
    }

    #persona-speak-btn {
      flex-shrink: 0;
      margin-top: 2px;
      width: 26px; height: 26px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: rgba(0, 0, 0, 0.35);
      color: rgba(255, 255, 255, 0.55);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      transition: background 0.2s, color 0.2s;
      backdrop-filter: blur(4px);
    }
    #persona-speak-btn:hover  { background: rgba(0,0,0,0.55); color: rgba(255,255,255,0.9); }
    #persona-speak-btn:disabled { opacity: 0.18; cursor: default; }

    /* ─── Chat toggle ────────────────────── */
    #chat-toggle { flex-shrink:0; height:28px; display:flex; align-items:center; gap:6px; padding:0 14px; user-select:none; transition:background 0.15s; }
    #chat-toggle.splitter-active { cursor: pointer; }
    #chat-toggle.splitter-active.splitter-draggable { cursor: ns-resize; }
    #chat-toggle.splitter-active:hover { background: rgba(255,255,255,0.05); }
    .section-divider-line { flex:1; height:1px; background:linear-gradient(90deg,transparent,rgba(255,255,255,0.07),transparent); }
    #chat-toggle-label { font-size:9.5px; font-weight:500; letter-spacing:.1em; text-transform:uppercase; color:rgba(255,255,255,0.2); }
    .chat-badge { min-width:16px; height:16px; padding:0 4px; border-radius:8px; background:rgba(99,102,241,0.75); color:rgba(255,255,255,0.9); font-size:9px; font-weight:600; display:flex; align-items:center; justify-content:center; }
    .chat-chevron { font-size:14px; color:rgba(255,255,255,0.25); transition:transform 0.28s cubic-bezier(0.4,0,0.2,1); display:inline-block; }
    .chat-chevron.collapsed { transform:rotate(180deg); }
    /* Grip dots — visible in constrained mode only */
    #chat-toggle-grip { flex-shrink:0; width:24px; height:100%; display:none; align-items:center; justify-content:center; }
    #chat-toggle.splitter-active #chat-toggle-grip { display:flex; }
    .grip-dots { width:20px; height:4px; background-image:radial-gradient(circle, rgba(255,255,255,0.25) 1px, transparent 1px); background-size:5px 4px; background-repeat:repeat-x; background-position:center; }
    /* Suppress transitions while dragging the splitter */
    .dragging-split, .dragging-split * { transition: none !important; }

    /* ─── Chat panel ─────────────────────── */
    #chat-panel { display:flex; flex-direction:column; flex:1 1 auto; min-height:0; overflow:hidden; transition:max-height 0.32s cubic-bezier(0.4,0,0.2,1); }
    #chat-panel.collapsed { max-height:0; overflow:hidden; }

    /* ─── Chat empty hint ────────────────── */
    .chat-empty-hint { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:12px; font-style:italic; color:rgba(255,255,255,0.13); pointer-events:none; user-select:none; }

    /* ─── Chat history ───────────────────── */
    #chat-history {
      flex: 1 1 0;
      min-height: 48px;
      overflow-y: auto;
      position: relative;
      padding: 4px 12px 6px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255, 255, 255, 0.1) transparent;
      user-select: text;
      -webkit-user-select: text;
    }
    #chat-history::-webkit-scrollbar       { width: 3px; }
    #chat-history::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

    .chat-bubble {
      max-width: 84%;
      padding: 8px 12px;
      border-radius: 14px;
      font-size: 12.5px;
      line-height: 1.55;
      word-break: break-word;
    }
    .chat-bubble.user {
      align-self: flex-end;
      background: linear-gradient(135deg, rgba(99,102,241,0.78), rgba(76,78,210,0.62));
      border: 1px solid rgba(99,102,241,0.3);
      color: rgba(255, 255, 255, 0.95);
      border-bottom-right-radius: 4px;
      box-shadow: 0 2px 10px rgba(99,102,241,0.2);
    }
    .chat-bubble.persona {
      align-self: flex-start;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.09);
      color: rgba(255, 255, 255, 0.82);
      font-style: italic;
      border-bottom-left-radius: 4px;
    }

    /* Typing indicator inside pending persona bubble */
    .typing-dots {
      display: inline-flex;
      gap: 4px;
      align-items: center;
      padding: 2px 0;
    }
    .typing-dots span {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.4);
      animation: dot-pulse 1.4s ease-in-out infinite both;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.22s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.44s; }

    /* ─── Input bar ──────────────────────── */
    #input-bar {
      flex-shrink: 0;
      display: flex;
      gap: 8px;
      align-items: center;
      padding: 7px 10px 11px;
      background: rgba(0, 0, 0, 0.2);
      border-top: 1px solid rgba(255, 255, 255, 0.05);
    }
    #chat-input {
      flex: 1;
      min-width: 0;
      padding: 9px 12px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.05);
      color: rgba(255, 255, 255, 0.9);
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      user-select: text;
      -webkit-user-select: text;
    }
    #chat-input:focus {
      border-color: rgba(99, 102, 241, 0.5);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
    }
    #chat-input::placeholder { color: rgba(255, 255, 255, 0.2); }

    #btn-send {
      flex-shrink: 0;
      width: 36px; height: 36px;
      border-radius: 10px;
      border: none;
      background: rgba(99, 102, 241, 0.82);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.1s;
    }
    #btn-send:hover  { background: rgba(99,102,241,1); }
    #btn-send:active { transform: scale(0.93); }
    #btn-send:disabled { opacity: 0.3; cursor: default; }
  </style>
</head>
<body>
  <div id="desktop-root">

    <!-- Title bar — primary drag region -->
    <div id="header" class="pywebview-drag-region">
      <span id="header-title">Home Pal</span>
      <div class="header-btns">
        <button id="btn-tts-toggle" class="header-btn" title="Mute auto-speak">🔊</button>
        <button id="btn-minimize"   class="header-btn" title="Minimize">−</button>
        <button id="btn-close"      class="header-btn" title="Close">×</button>
      </div>
    </div>

    <!-- Character portrait — also a drag region.
         The speech bubble is overlaid at the top of this area. -->
    <div id="persona-img-wrap" class="pywebview-drag-region">
      <div id="persona-spinner">
        <div class="spinner-dots"><span></span><span></span><span></span></div>
        Generating…
      </div>
      <img id="persona-img" alt="" style="display:none;">

      <!-- Ambient quote bubble — absolute at top, arrow points DOWN toward character -->
      <div id="persona-bubble-wrap">
        <div id="persona-bubble" class="persona-bubble">&nbsp;</div>
        <button id="persona-speak-btn" title="Speak" style="display:none;">&#128266;</button>
      </div>
    </div>

    <div id="chat-toggle" aria-label="Drag to resize / tap to collapse chat">
      <div class="section-divider-line"></div>
      <span id="chat-toggle-label">Chat</span>
      <span id="chat-badge" class="chat-badge" style="display:none;">0</span>
      <span id="chat-toggle-grip" aria-hidden="true"><span class="grip-dots"></span></span>
      <span id="chat-chevron" class="chat-chevron">&#8964;</span>
    </div>

    <div id="chat-panel">
      <!-- Ephemeral conversation history -->
      <div id="chat-history">
        <div class="chat-empty-hint">Ask me anything…</div>
      </div>

      <!-- Message input -->
      <div id="input-bar">
        <input id="chat-input" type="text" placeholder="Ask me anything…" autocomplete="off">
        <button id="btn-send" title="Send">
          <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15"
               viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </div>

  </div>
  <script src="{{ url_for('static', filename='js/persona_desktop.js') }}"></script>
</body>
</html>
