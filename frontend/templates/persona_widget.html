<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Persona</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      background: #{{ bg }};
      font-family: 'Inter', Arial, sans-serif;
      overflow: hidden;
    }

    .persona-widget {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      height: 100%;
      overflow: hidden;
    }

    #persona-spinner {
      color: rgba(255, 255, 255, 0.55);
      font-size: 0.85rem;
      font-style: italic;
      padding: 12px;
    }

    #persona-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      height: 100%;
    }

    .persona-bubble-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
      margin-bottom: 8px;
      z-index: 10;
      width: 90%;
    }

    .persona-speak-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 14px;
      opacity: 0.35;
      padding: 2px;
      flex-shrink: 0;
      transition: opacity 0.2s;
      line-height: 1;
    }

    .persona-speak-btn:hover { opacity: 0.85; }
    .persona-speak-btn:disabled { opacity: 0.15; cursor: default; }

    .persona-bubble {
      background: rgba(255, 255, 255, 0.92);
      border-radius: 14px;
      padding: 9px 14px;
      font-size: clamp(12px, 3.5vw, 15px);
      font-style: italic;
      color: #1b2559;
      filter: drop-shadow(0 4px 10px rgba(30, 30, 60, 0.35));
      max-width: 90%;
      text-align: center;
      position: relative;
      transition: opacity 0.3s ease;
      word-break: break-word;
    }

    .persona-suggestion {
      font-size: clamp(10px, 2.8vw, 12px);
      color: rgba(200, 210, 240, 0.6);
      font-style: italic;
      max-width: 90%;
      text-align: center;
      margin-bottom: 6px;
      line-height: 1.3;
      transition: opacity 0.3s ease;
      flex-shrink: 0;
    }

    .persona-bubble::after {
      content: '';
      position: absolute;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%);
      border: 8px solid transparent;
      border-top-color: rgba(255, 255, 255, 0.92);
      border-bottom: 0;
    }

    #persona-img-wrap {
      margin-top: -10px;
      width: 100%;
      flex: 1 1 0;
      min-height: 0;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    #persona-img {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      display: block;
      border-radius: 12px;
      -webkit-mask-image: linear-gradient(to bottom, black 65%, transparent 100%);
      mask-image: linear-gradient(to bottom, black 65%, transparent 100%);
      transition: opacity 0.6s ease;
    }

    @keyframes persona-float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-10px); }
    }

    /* ── Stats HUD ───────────────────────────────── */
    .persona-hud {
      width: 88%;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      padding: 6px 10px;
      margin-bottom: 6px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
      filter: drop-shadow(0 2px 6px rgba(0, 0, 0, 0.3));
    }
    .hud-row {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .hud-level {
      font-size: 10px;
      font-weight: 500;
      color: rgba(99, 102, 241, 0.9);
      letter-spacing: 0.05em;
      white-space: nowrap;
      min-width: 28px;
    }
    .hud-bar-wrap {
      flex: 1;
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      overflow: hidden;
    }
    .hud-bar {
      height: 100%;
      border-radius: 2px;
      transition: width 0.6s ease;
    }
    .hud-xp-bar  { background: linear-gradient(90deg, rgba(99,102,241,0.8), rgba(139,92,246,0.8)); }
    .hud-aff-bar { background: linear-gradient(90deg, rgba(244,63,94,0.8), rgba(251,113,133,0.7)); }
    .hud-nrg-bar { background: linear-gradient(90deg, rgba(234,179,8,0.8), rgba(250,204,21,0.7)); }
    .hud-icon {
      font-size: 9px;
      opacity: 0.7;
      white-space: nowrap;
    }
    .hud-xp-text {
      font-size: 9px;
      color: rgba(255,255,255,0.35);
      white-space: nowrap;
      min-width: 38px;
      text-align: right;
    }

    /* ── Unlock toast ────────────────────────────── */
    #persona-unlock-toast {
      position: fixed;
      top: 12px;
      left: 50%;
      transform: translateX(-50%) translateY(-40px);
      background: rgba(99, 102, 241, 0.92);
      color: #fff;
      font-size: 11px;
      font-weight: 500;
      padding: 6px 14px;
      border-radius: 20px;
      filter: drop-shadow(0 4px 12px rgba(99,102,241,0.5));
      pointer-events: none;
      opacity: 0;
      transition: transform 0.35s ease, opacity 0.35s ease;
      z-index: 100;
      white-space: nowrap;
    }
    #persona-unlock-toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="persona-widget">
    <div id="persona-spinner">Generating...</div>
    <div id="persona-unlock-toast"></div>
    <div id="persona-content" style="display:none;">
      <div id="persona-suggestion" class="persona-suggestion" style="display:none;"></div>
      <div class="persona-hud" id="persona-hud" style="display:none;">
        <div class="hud-row">
          <span class="hud-level" id="hud-level">Lv.1</span>
          <div class="hud-bar-wrap"><div class="hud-bar hud-xp-bar" id="hud-xp-bar" style="width:0%"></div></div>
          <span class="hud-xp-text" id="hud-xp-text">0 XP</span>
        </div>
        <div class="hud-row">
          <span class="hud-icon">♡</span>
          <div class="hud-bar-wrap"><div class="hud-bar hud-aff-bar" id="hud-aff-bar" style="width:0%"></div></div>
          <span class="hud-icon">⚡</span>
          <div class="hud-bar-wrap"><div class="hud-bar hud-nrg-bar" id="hud-nrg-bar" style="width:0%"></div></div>
        </div>
      </div>
      <div class="persona-bubble-row">
        <div class="persona-bubble" id="persona-bubble"></div>
        <button id="persona-speak-btn" class="persona-speak-btn" title="Speak" style="display:none;">🔊</button>
      </div>
      <div id="persona-img-wrap"><img id="persona-img" alt="persona"></div>
    </div>
  </div>
  <script src="{{ url_for('static', filename='js/persona.js') }}"></script>
</body>
</html>
